<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAF8F5;--t:#2C2420;--tl:#8C7B6E;--a:#C4956A;--a2:#E8D5C4;--ad:#A0704A;--b:#EDE8E2;--sh:rgba(160,130,110,.08);--g:#C9A96E;--green:#4A7A4A;--blue:#3A5A8A;--gold:#A07020}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.hdr{background:linear-gradient(135deg,#2C2420 0%,#4A3A30 50%,#5C4A3A 100%);color:#fff;padding:52px 60px 44px;position:relative;overflow:hidden}

.hc{position:relative;z-index:1;max-width:1200px;margin:0 auto}
.hb{display:inline-block;background:rgba(201,169,110,.18);border:1px solid rgba(201,169,110,.35);color:#C9A96E;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:14px}
h1{font-size:36px;font-weight:700;margin-bottom:8px}
.sub{font-size:15px;opacity:.65;font-weight:300;max-width:480px}
.st{display:flex;gap:36px;margin-top:28px;padding-top:22px;border-top:1px solid rgba(255,255,255,.1)}
.si .sn{font-size:26px;font-weight:700;color:#C9A96E}
.si .sl{font-size:12px;opacity:.5;margin-top:2px}
.sw{max-width:1200px;margin:-22px auto 0;padding:0 60px;position:relative;z-index:10}
.sb{background:#fff;border-radius:14px;box-shadow:0 4px 28px var(--sh);display:flex;align-items:center;padding:12px 18px;gap:10px}
.sb input{flex:1;border:none;outline:none;font-size:15px;color:var(--t);background:transparent;font-family:inherit}
.sb input::placeholder{color:#C0B5AD}
.sc{font-size:12px;color:var(--tl);background:var(--bg);padding:4px 10px;border-radius:8px}
.tw{max-width:1200px;margin:28px auto 0;padding:0 60px}
.tabs{display:flex;gap:8px;flex-wrap:wrap}
.tab{padding:7px 16px;border-radius:10px;font-size:13.5px;cursor:pointer;border:1.5px solid var(--b);background:#fff;color:var(--tl);transition:all .2s;font-family:inherit;font-weight:500}
.tab:hover{border-color:var(--a);color:var(--ad)}
.tab.on{background:var(--t);color:#fff;border-color:var(--t)}
.tab .cnt{display:inline-block;background:rgba(0,0,0,.06);padding:1px 5px;border-radius:5px;font-size:11px;margin-left:5px}
.tab.on .cnt{background:rgba(255,255,255,.18)}
.mw{max-width:1200px;margin:24px auto 70px;padding:0 60px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:36px}
.card{background:#fff;border-radius:14px;border:1px solid var(--b);padding:18px;transition:all .28s;animation:ic .4s ease both}
.card:hover{transform:translateY(-3px);box-shadow:0 10px 36px var(--sh);border-color:var(--a2)}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cn{font-size:14.5px;font-weight:600;line-height:1.4;flex:1;padding-right:10px}
.cp{font-size:13.5px;font-weight:700;color:var(--ad);white-space:nowrap}
.csz{font-size:11.5px;color:var(--tl);margin-top:2px}
.ctags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.tag{font-size:11px;padding:2px 9px;border-radius:20px;background:var(--a2);color:var(--ad);font-weight:500}
.tag.s{background:#E4EFE4;color:var(--green)}
.tag.t{background:#E4EBF4;color:var(--blue)}
.tag.x{background:#FFF3DC;color:var(--gold)}
.chr{height:1px;background:var(--b);margin:9px 0}
.cdesc{font-size:12.5px;color:var(--tl);line-height:1.75}
.cskin{font-size:11.5px;color:var(--ad);margin-top:7px;font-weight:500}
.cing{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.ing{font-size:11px;padding:2px 7px;border-radius:5px;background:var(--bg);color:var(--tl);border:1px solid var(--b)}
.seg-hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1.5px solid var(--b)}
.seg-title{font-size:14px;font-weight:700;color:var(--t)}
.seg-sub{font-size:12px;color:var(--tl);margin-left:auto}
.rec-box{background:#fff;border-radius:14px;border:1px solid var(--b);overflow:hidden;margin-bottom:20px;animation:ic .4s ease}

.rec-val{color:var(--t);line-height:1.5;flex:1}
.combo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:32px}
.combo-card{background:#fff;border-radius:14px;border:1px solid var(--b);overflow:hidden;animation:ic .4s ease}

.combo-name{font-size:14px;font-weight:600}
.combo-budget{font-size:11.5px;opacity:.7;margin-top:2px}
.combo-body{padding:12px 16px}

.qa-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;margin-bottom:32px}
.qa-card{background:#fff;border-radius:12px;border:1px solid var(--b);padding:14px 16px;animation:ic .4s ease}

.qa{font-size:12.5px;color:var(--tl);line-height:1.75}

.ing-table tr:hover td{background:#FAF8F5}
.ing-name{font-weight:600;color:var(--t)}
.ing-effect{color:var(--blue)}
.ing-prod{color:var(--ad)}
.ing-star{color:var(--gold);font-weight:700}
.footer{text-align:center;padding:28px;font-size:12px;color:var(--tl);border-top:1px solid var(--b)}
.empty{text-align:center;padding:60px 20px;color:var(--tl);font-size:14px}
@keyframes ic{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){.hdr{padding:32px 20px 28px}h1{font-size:26px}.st{gap:20px;flex-wrap:wrap}.sw,.tw,.mw{padding:0 16px}.sw{margin-top:-18px}.cards,.qa-grid,.combo-grid{display:block}.rec-row{flex-direction:column}}}
</style>
</head>

var qas=[{"q": "产品安全吗？有没有激素？", "a": "不含酒精、铅汞激素，所有成分都有专利，功效有功效报告，经过国家药监检测合格，完全可以放心使用。"}, {"q": "多久能看到效果？", "a": "肌肤代谢周期是28天，皱纹不是一天形成的。玻色因这类成分需要4-6周才能看到明显效果，很多顾客反馈用到4周左右效果就很好了。"}, {"q": "敏感肌可以用吗？", "a": "产品经过多次皮肤刺激性测试在安全范围内，敏感肌建议先局部测试。神经酰胺系列专门针对敏感肌肤设计，相对更温和。"}, {"q": "会不会过敏？", "a": "任何护肤品都有个体差异，更年期肌肤本身就比较敏感，建议先用舒缓系列建立肌肤耐受，再逐步加入抗衰产品。"}, {"q": "太贵了怎么办？", "a": "好的产品是时间沉淀出来的，玻色因、胶原蛋白、PDRN这些都是高端抗衰成分，一分价钱一分货，脸上的投资最值得。"}, {"q": "用完没效果怎么办？", "a": "皮肤改善分三阶段：①调理期激活皮肤（3-7天）→②反跳期老废细胞排出（7-14天看似变差）→③修复期真正改善松垮垂纹。很多人倒在第二阶段就放弃了。"}, {"q": "油霜会不会太油？", "a": "2-3颗手心混合按压，润而不腻。核心是里面的油珠，按珠子数量计算用量，冬天3-4颗，夏天2-3颗即可。"}, {"q": "软膜有刺痛感正常吗？", "a": "正常！产品采用小分子渗透技术，皮肤底层缺水时会出现细胞应急反应，说明在深层做营养补充。前三天可用保湿霜打底后再敷。"}];

var ingData=[["玻色因", "促胶原、抗衰紧致", "金绷带面霜2.0、紫绷带、精华全线"], ["专利胶原蛋白", "胶原直补、嘭弹紧致", "胶原闪充精华、黄金软膜、眼膜全线"], ["PDRN/三文鱼", "激活细胞、修护损伤", "油霜、发光水、胶原弹"], ["神经酰胺", "屏障修复、锁水", "赋活舒缓精华乳/霜、赋活保湿精华乳"], ["依克多因", "抗敏舒缓、屏障强韧", "日防夜护精华、次抛精华"], ["烟酰胺", "提亮抑黑、均匀肤色", "水光小白瓶、素颜乳、次抛精华"], ["大豆异黄酮", "补充雌激素、抗衰老", "琥珀油霜核心成分"], ["六重更年油", "蛋黄/月见草/白池花等6种", "琥珀油霜核心成分"], ["多肽/胜肽", "精准淡纹、紧致轮廓", "眼霜、面霜、精华全线"], ["海茴香", "细胞修护、抗氧焕活", "调肤水、紫绷带面霜、精华"], ["肌肽", "抗糖化，保护胶原", "眼膜、冻干面膜"]];
var plans=[{"n": "干皮抗衰方案", "b": "总预算 1000-2000", "it": ["发光水/细胞水", "次抛精华（玻尿酸）", "精华/油霜", "面霜", "黄金软膜每周3次"]}, {"n": "敏感修护方案", "b": "总预算 800-1500", "it": ["舒缓修护喷雾", "赋活舒缓精华乳", "赋活舒缓精华乳霜", "舒缓软膜/黄金软膜"]}, {"n": "油霜主推方案", "b": "总预算 2000+", "it": ["琥珀油霜（核心）", "精华水打底", "胶原闪充精华", "黄金面膜搭配"]}, {"n": "眼部专项方案", "b": "总预算 800-1500", "it": ["眼脸全能紧致乳", "淡纹紧致眼膜套", "眼部紫熨斗"]}, {"n": "懒人高客单方案", "b": "总预算 3000+", "it": ["胶原闪充精华（日）", "日防夜护精华套盒", "金绷带面霜2.0", "胶原PAO美容仪"]}];

function card(p,i){
  var tags=p.tg.map(function(t){return'<span class="tag '+p.tt+'">'+t+'</span>'}).join('');
  var ings=p.i.slice(0,4).map(function(x){return'<span class="ing">'+x+'</span>'}).join('');
  return'<div class="card" style="animation-delay:'+(i*0.04)+'s"><div class="ctop"><div class="cn">'+p.n+'</div><div><div class="cp">'+p.p+'</div><div class="csz">'+p.s+'</div></div></div><div class="ctags">'+tags+'</div><div class="chr"></div><div class="cdesc">'+p.d+'</div><div class="cing">'+ings+'</div><div class="cskin">适用：'+p.sk+'</div></div>';
}

function recBox(cat){
  var m=catMeta[cat];
  if(!m)return'';
  var h='<div class="rec-box"><div class="rec-hdr"><span class="rec-hdr-title">&#x1F4A1; 私域推荐场景</span></div><div class="rec-body">';
  m.tips.forEach(function(t){h+='<div class="rec-row"><span class="rec-scene">'+t[0]+'</span><span class="rec-val">'+t[1]+'</span></div>';});
  h+='</div></div>';
  return h;
}

function render(cat,kw){
  kw=(kw||'').toLowerCase();
  var mw=document.getElementById('mainWrap');
  var sc=document.getElementById('scnt');
  var h='';
  if(cat==='私域'){
    sc.textContent='5 套搭配方案';
    h+='<div class="combo-grid">';
    plans.forEach(function(c){
      h+='<div class="combo-card"><div class="combo-top"><div class="combo-name">'+c.n+'</div><div class="combo-budget">'+c.b+'</div></div><div class="combo-body">';
      c.it.forEach(function(x){h+='<div class="combo-step">'+x+'</div>';});
      h+='</div></div>';
    });
    h+='</div>';
  }else if(cat==='成分'){
    sc.textContent='11 个核心成分';
    h+='<table class="ing-table"><thead><tr><th>成分名称</th><th>核心功效</th><th>代表产品</th></tr></thead><tbody>';
    ingData.forEach(function(r){
      var star=r[2].indexOf('油霜')>-1;
      h+='<tr><td class="'+(star?'ing-star':'ing-name')+'">'+r[0]+'</td><td class="ing-effect">'+r[1]+'</td><td class="ing-prod">'+r[2]+'</td></tr>';
    });
    h+='</tbody></table>';
  }else if(cat==='qa'){
    sc.textContent='8 个常见问题';
    h+='<div class="qa-grid">';
    qas.forEach(function(q){h+='<div class="qa-card"><div class="qq">'+q.q+'</div><div class="qa">'+q.a+'</div></div>';});
    h+='</div>';
  }else{
    var f=P.filter(function(p){
      if(cat!=='all'&&p.c!==cat)return false;
      if(kw){var s=(p.n+p.d+p.sk+p.i.join('')).toLowerCase();return s.indexOf(kw)>-1;}
      return true;
    });
    sc.textContent=f.length+' 个产品';
    var by={};
    f.forEach(function(p){if(!by[p.c])by[p.c]=[];by[p.c].push(p);});
    var cats=cat==='all'?Object.keys(by).sort():[cat];
    cats.forEach(function(c){
      h+='<div class="seg-hdr"><span class="seg-title">'+(catNames[c]||c)+'</span><span class="seg-sub">'+by[c].length+'款</span></div>';
      if(catMeta[c])h+=recBox(c);
      h+='<div class="cards">';
      by[c].forEach(function(p,i){h+=card(p,i);});
      h+='</div>';
    });
    if(f.length===0)h+='<div class="empty">&#x6CA1;&#x6709;&#x627E;&#x5230;&#xFF0C;&#x8BD5;&#x8BD5;&#x5176;&#x4ED6;&#x5173;&#x952E;&#x8BCD;</div>';
  }
  mw.innerHTML=h;
}

document.getElementById('tabs').addEventListener('click',function(e){
  var btn=e.target.closest('.tab');
  if(!btn)return;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  btn.classList.add('on');
  render(btn.dataset.cat,document.getElementById('si').value);
});
document.getElementById('si').addEventListener('input',function(e){
  var a=document.querySelector('.tab.on');
  render(a?a.dataset.cat:'all',e.target.value);
});
render('all','');
</script>
